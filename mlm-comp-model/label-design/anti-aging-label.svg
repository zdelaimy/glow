<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="750" viewBox="0 0 360 750">
  <!--
    Glow Labs Anti-Aging Serum Label
    Bottle: 4" tall, 1.3" diameter
    Label:  1.2" wide × 2.5" tall at 300 DPI = 360 × 750 px
    Material: Clear BOPP with white ink
    NOTE: All text printed in WHITE ink on clear film.
    White ink on frosted glass appears as soft gray/silver.
  -->

  <!-- "Glow Labs" rotated vertically (reading bottom to top) -->
  <text
    x="135"
    y="370"
    transform="rotate(-90, 135, 370)"
    font-family="'Montserrat', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="46"
    letter-spacing="5"
    fill="#FFFFFF"
    text-anchor="middle"
  >Glow Labs</text>

  <!-- "ANTI-AGING" horizontal -->
  <text
    x="180"
    y="555"
    font-family="'Montserrat', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="24"
    letter-spacing="3.5"
    fill="#FFFFFF"
    text-anchor="middle"
  >ANTI-AGING</text>

  <!-- "SERUM" horizontal -->
  <text
    x="180"
    y="588"
    font-family="'Montserrat', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="24"
    letter-spacing="3.5"
    fill="#FFFFFF"
    text-anchor="middle"
  >SERUM</text>

  <!-- Thin separator line -->
  <line x1="110" y1="608" x2="250" y2="608" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>

  <!-- Ingredients subtitle -->
  <text
    x="180"
    y="635"
    font-family="'Montserrat', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="11"
    letter-spacing="1.5"
    fill="#FFFFFF"
    opacity="0.7"
    text-anchor="middle"
  >retinol · vitamin c · hyaluronic acid</text>

  <!-- Volume -->
  <text
    x="180"
    y="660"
    font-family="'Montserrat', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="10"
    letter-spacing="1.5"
    fill="#FFFFFF"
    opacity="0.5"
    text-anchor="middle"
  >30 mL / 1.0 fl oz</text>

</svg>
